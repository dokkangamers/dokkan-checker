<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ドッカン フェス限 所持率チェッカー</title>
<style>
:root {
  --bg:#10131a;
  --panel:#1a2030;
  --panel2:#232b3e;
  --text:#f7f8fc;
  --muted:#aeb7ca;
  --accent:#ffd54a;
  --owned:#2ecc71;
  --line:#374057;
  --danger:#e85d75;
}
* { box-sizing:border-box; }
body {
  margin:0;
  font-family:system-ui,-apple-system,"Segoe UI","Yu Gothic UI","Meiryo",sans-serif;
  background:linear-gradient(180deg,#0d1017,#151a25);
  color:var(--text);
  min-height:100vh;
}
.container { max-width:1200px; margin:auto; padding:18px; }
h1 {
  margin:0 0 14px;
  font-size:clamp(24px,4vw,38px);
  text-align:center;
}
.sub {
  text-align:center;
  color:var(--muted);
  margin:-6px 0 16px;
}
.summary {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:14px;
}
.stat {
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  text-align:center;
}
.stat strong {
  display:block;
  font-size:25px;
  color:var(--accent);
  margin-top:4px;
}
.progress {
  height:14px;
  background:#090d13;
  border:1px solid var(--line);
  border-radius:999px;
  overflow:hidden;
  margin:12px 0 16px;
}
.progress > div {
  height:100%;
  background:linear-gradient(90deg,#30c875,#ffd54a);
  width:0%;
  transition:width .2s;
}
.controls {
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  display:grid;
  grid-template-columns:2fr repeat(4,1fr);
  gap:8px;
  margin-bottom:10px;
}
.actions-bar {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:16px;
}
input, select, button {
  min-height:42px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#111722;
  color:var(--text);
  padding:9px 10px;
  font-size:14px;
}
button {
  cursor:pointer;
  font-weight:700;
}
button:hover { filter:brightness(1.15); }
button.danger { border-color:var(--danger); }
.list {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(315px,1fr));
  gap:10px;
}
.card {
  background:var(--panel);
  border:2px solid var(--line);
  border-radius:14px;
  padding:13px;
  display:grid;
  gap:8px;
  transition:.15s;
}

.card-main{
  display:grid;
  grid-template-columns:88px 1fr;
  gap:12px;
  align-items:start;
}
.character-icon{
  width:88px;
  height:88px;
  object-fit:contain;
  border-radius:10px;
  background:#111722;
  border:1px solid var(--line);
}
@media (max-width:520px){
  .card-main{grid-template-columns:72px 1fr;}
  .character-icon{width:72px;height:72px;}
}

.card.owned {
  border-color:var(--owned);
  background:#162a25;
}
.topline {
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:start;
}
.id {
  color:var(--muted);
  font-size:12px;
  white-space:nowrap;
}
.title {
  color:var(--accent);
  font-weight:800;
  line-height:1.3;
}
.name {
  font-size:18px;
  font-weight:800;
  line-height:1.35;
}
.badges {
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.badge {
  padding:4px 8px;
  border-radius:999px;
  background:var(--panel2);
  color:#dce3f3;
  font-size:12px;
}
.actions {
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:center;
}
.actions label {
  display:flex;
  align-items:center;
  gap:7px;
  font-weight:700;
}
.actions select { min-height:36px; }
.meta {
  color:var(--muted);
  font-size:12px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.empty {
  grid-column:1/-1;
  text-align:center;
  color:var(--muted);
  padding:40px;
}
.footer {
  color:var(--muted);
  text-align:center;
  padding:18px 0 6px;
  font-size:12px;
}
.hidden-input { display:none; }
@media (max-width:800px) {
  .summary { grid-template-columns:repeat(2,1fr); }
  .controls { grid-template-columns:1fr 1fr; }
  .controls input { grid-column:1/-1; }
}
</style>
</head>
<body>
<div class="container">
  <h1>ドッカン フェス限 所持率チェッカー</h1>

  <section class="summary">
    <div class="stat"><span>所持数</span><strong id="ownedCount">0</strong><small id="totalText">/ 0</small></div>
    <div class="stat"><span>所持率</span><strong id="ownedRate">0%</strong></div>
    <div class="stat"><span>虹</span><strong id="rainbowCount">0</strong></div>
    <div class="stat"><span>未所持</span><strong id="missingCount">0</strong></div>
  </section>

  <div class="progress"><div id="progressBar"></div></div>

  <section class="controls">
    <input id="search" type="search" placeholder="二つ名・キャラ名で検索">
    <select id="typeFilter"><option value="">全属性</option></select>
    <select id="rarityFilter"><option value="">全レア</option></select>
    <select id="yearFilter"><option value="">全年</option></select>
    <select id="ownedFilter">
      <option value="">所持状態：すべて</option>
      <option value="owned">所持のみ</option>
      <option value="missing">未所持のみ</option>
      <option value="rainbow">虹のみ</option>
    </select>
  </section>

  <div class="actions-bar">
    <button id="resetBtn" class="danger">全リセット</button>
  </div>

  <main id="list" class="list"></main>
  <div class="footer">Excel掲載データ：179体 ／ 所持・凸数はブラウザ内に自動保存</div>
</div>

arity": "LR", "category": "フェス限", "releaseDate": "2025/08/08", "eza": "×", "seza": "×"}, {"id": 174, "order": 174, "title": "揺り動かされる戦闘本能", "name": "ゴールデンフリーザ+ゴジータ", "type": "極速", "rarity": "LR", "category": "フェス限", "releaseDate": "2025/08/29", "eza": "×", "seza": "×"}, {"id": 175, "order": 175, "title": "新生ツフル人の超パワー", "name": "スーパーベビー1", "type": "極力", "rarity": "UR", "category": "フェス限", "releaseDate": "2025/09/30", "eza": "×", "seza": "×"}, {"id": 176, "order": 176, "title": "気迫あふれる大決戦", "name": "超サイヤ人4孫悟空(ミニ)(DAIMA)", "type": "超技", "rarity": "UR", "category": "フェス限", "releaseDate": "2025/10/30", "eza": "×", "seza": "×"}, {"id": 177, "order": 177, "title": "緊急事態への対処", "name": "人造人間16号", "type": "極速", "rarity": "UR", "category": "フェス限", "releaseDate": "2025/11/28", "eza": "×", "seza": "×"}, {"id": 178, "order": 178, "title": "正義の共闘", "name": "アルティメット孫悟飯+ガンマ1号", "type": "超速", "rarity": "LR", "category": "フェス限", "releaseDate": "2025/12/29", "eza": "×", "seza": "×"}, {"id": 179, "order": 179, "title": "正義の結託", "name": "ガンマ2号+ピッコロ(潜在能力解放)", "type": "超力", "rarity": "LR", "category": "フェス限", "releaseDate": "2025/12/29", "eza": "×", "seza": "×"}];
const STORAGE_KEY = "dokkan_fes_checker_master_2019_v1";
let saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");

const $ = id => document.getElementById(id);
const list = $("list");

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
}

function getState(id) {
  return saved[id] || { owned:false, dupe:0 };
}

function uniqueValues(key) {
  return [...new Set(characters.map(c => c[key]).filter(Boolean))];
}

function setupFilters() {
  const superTypes = ["超速", "超技", "超知", "超力", "超体"];
  const extremeTypes = ["極速", "極技", "極知", "極力", "極体"];
  const availableTypes = new Set(uniqueValues("type"));

  const superOptions = superTypes
    .filter(v => availableTypes.has(v))
    .map(v => `<option value="${v}">${v}</option>`)
    .join("");

  const extremeOptions = extremeTypes
    .filter(v => availableTypes.has(v))
    .map(v => `<option value="${v}">${v}</option>`)
    .join("");

  $("typeFilter").insertAdjacentHTML(
    "beforeend",
    `<optgroup label="超属性">${superOptions}</optgroup>
     <optgroup label="極属性">${extremeOptions}</optgroup>`
  );

  uniqueValues("rarity").forEach(v =>
    $("rarityFilter").insertAdjacentHTML("beforeend", `<option value="${v}">${v}</option>`));

  [...new Set(characters.map(c => c.releaseDate.slice(0,4)))].sort().forEach(v =>
    $("yearFilter").insertAdjacentHTML("beforeend", `<option value="${v}">${v}年</option>`));
}

function getFiltered() {
  const q = $("search").value.trim().toLowerCase();
  const type = $("typeFilter").value;
  const rarity = $("rarityFilter").value;
  const year = $("yearFilter").value;
  const ownedMode = $("ownedFilter").value;

  return characters.filter(c => {
    const st = getState(c.id);
    const searchable = `${c.title} ${c.name}`.toLowerCase();

    if (q && !searchable.includes(q)) return false;
    if (type && c.type !== type) return false;
    if (rarity && c.rarity !== rarity) return false;
    if (year && !c.releaseDate.startsWith(year)) return false;
    if (ownedMode === "owned" && !st.owned) return false;
    if (ownedMode === "missing" && st.owned) return false;
    if (ownedMode === "rainbow" && !(st.owned && st.dupe === 4)) return false;
    return true;
  }).sort((a, b) => a.order - b.order);
}

function updateSummary() {
  const total = characters.length;
  const owned = characters.filter(c => getState(c.id).owned).length;
  const rainbow = characters.filter(c => {
    const st = getState(c.id);
    return st.owned && st.dupe === 4;
  }).length;
  const rate = total ? owned / total * 100 : 0;

  $("ownedCount").textContent = owned;
  $("totalText").textContent = `/ ${total}`;
  $("ownedRate").textContent = `${rate.toFixed(1)}%`;
  $("rainbowCount").textContent = rainbow;
  $("missingCount").textContent = total - owned;
  $("progressBar").style.width = `${rate}%`;
}

function render() {
  const filtered = getFiltered();
  list.innerHTML = "";

  if (!filtered.length) {
    list.innerHTML = '<div class="empty">条件に一致するキャラはいません。</div>';
    updateSummary();
    return;
  }

  filtered.forEach(c => {
    const st = getState(c.id);
    const card = document.createElement("article");
    card.className = "card" + (st.owned ? " owned" : "");

    const dupeOptions = [
      ["0","無凸"],["1","1凸"],["2","2凸"],["3","3凸"],["4","虹"]
    ].map(([v,label]) => `<option value="${v}" ${Number(v) === st.dupe ? "selected" : ""}>${label}</option>`).join("");

    const imagePath = `images/${c.id}.png`;

    card.innerHTML = `
      <div class="card-main">
        <img class="character-icon" src="${imagePath}" alt="${c.name}"
             onerror="if(!this.dataset.jpgTried){this.dataset.jpgTried='1';this.src='images/${c.id}.jpg';}else{this.onerror=null;this.src='images/no-image.png';}">
        <div>
          <div class="topline">
            <div class="title">【${c.title}】</div>
            <div class="id">ID ${c.id}</div>
          </div>
          <div class="name">${c.name}</div>
          <div class="badges">
        <span class="badge">${c.type}</span>
        <span class="badge">${c.rarity}</span>
        <span class="badge">${c.releaseDate.slice(0,4)}年</span>
        ${c.eza === "○" ? '<span class="badge">極限</span>' : ""}
        ${c.seza === "○" ? '<span class="badge">超極限</span>' : ""}
          </div>
        </div>
      </div>
      <div class="actions">
        <label>
          <input class="ownedCheck" type="checkbox" ${st.owned ? "checked" : ""}>
          所持
        </label>
        <label>
          凸数
          <select class="dupeSelect" ${st.owned ? "" : "disabled"}>
            ${dupeOptions}
          </select>
        </label>
      </div>
      <div class="meta">
        <span>実装日：${c.releaseDate}</span>
        <span>種別：${c.category}</span>
      </div>
    `;

    card.querySelector(".ownedCheck").addEventListener("change", e => {
      const current = getState(c.id);
      saved[c.id] = {
        owned: e.target.checked,
        dupe: e.target.checked ? current.dupe : 0
      };
      save();
      render();
    });

    card.querySelector(".dupeSelect").addEventListener("change", e => {
      saved[c.id] = {
        owned: true,
        dupe: Number(e.target.value)
      };
      save();
      render();
    });

    list.appendChild(card);
  });

  updateSummary();
}


["search","typeFilter","rarityFilter","yearFilter","ownedFilter"].forEach(id => {
  $(id).addEventListener(id === "search" ? "input" : "change", render);
});

$("resetBtn").addEventListener("click", () => {
  if (!confirm("所持・凸数データをすべてリセットしますか？")) return;
  saved = {};
  localStorage.removeItem(STORAGE_KEY);
  render();
});


setupFilters();
render();
</script>
</body>
</html>
